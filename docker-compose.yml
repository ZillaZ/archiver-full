services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bigshit
      POSTGRES_USER: bigshit
      POSTGRES_PASSWORD: bigshit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigshit"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-alpine
    environment:
      RABBITMQ_DEFAULT_USER: bigshit
      RABBITMQ_DEFAULT_PASS: bigshit
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: bigshit-master-key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://bigshit:bigshit@postgres:5432/bigshit
      RABBITMQ_URL: amqp://bigshit:bigshit@rabbitmq:5672
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: bigshit-master-key
      JWT_SECRET: change-me-in-production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    environment:
      DATABASE_URL: postgres://bigshit:bigshit@postgres:5432/bigshit
      RABBITMQ_URL: amqp://bigshit:bigshit@rabbitmq:5672
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: bigshit-master-key
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  meilidata: